services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: ../.env.production
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/syncspace
      - PORT=4000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
      - api_ydocs:/app/data/ydocs

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: ../.env.production
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:4000
      - NEXT_PUBLIC_LIVEKIT_URL=ws://localhost:7880
      - NEXT_PUBLIC_COLLAB_URL=ws://localhost:4000/collab
    depends_on:
      - api

volumes:
  mongodb_data:
  api_uploads:
  api_ydocs:
